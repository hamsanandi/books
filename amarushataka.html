<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #8b5e1a; --gold-light: #6b4510; --gold-dim: #a0783a;
  --bg: #ffffff; --section-bg: #fdf9f3; --header-bg: #f5ede0;
  --border: #d4c5a9; --border-light: #c0aa88;
  --text: #1a1208; --meta: #8a7055;
  --c2-base: #6e2510; --c2-light: #f5ddd5; --c2-mid: #b05c40;
}

body {
  font-family: 'EB Garamond', serif;
  background: var(--bg); color: var(--text);
  max-width: 860px; margin: 0 auto;
  padding: 0 0 60px; font-size: 16px; line-height: 1.6;
}

/* ── Top nav bar ── */
.site-nav { background: var(--header-bg); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; align-items: center; justify-content: space-between; gap: 8px; min-height: 42px; position: sticky; top: 0; z-index: 100; }
.nav-home { font-family: 'Cinzel', serif; font-size: 0.75rem; letter-spacing: 0.2em; color: var(--gold); text-decoration: none; text-transform: uppercase; white-space: nowrap; flex-shrink: 0; }
.nav-home.kn { font-family: 'Noto Serif Kannada', serif; letter-spacing: 0.05em; text-transform: none; font-size: 0.88rem; }
.nav-home:hover { text-decoration: underline; }
.nav-links { display: flex; align-items: center; gap: 0; flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none; }
.nav-links::-webkit-scrollbar { display: none; }
.nav-link { font-family: 'EB Garamond', serif; font-size: 0.78rem; color: var(--meta); text-decoration: none; padding: 0 10px; line-height: 42px; white-space: nowrap; border-left: 1px solid var(--border); transition: color 0.15s, background 0.15s; }
.nav-link:first-child { border-left: none; }
.nav-link:hover { color: var(--gold); background: rgba(139,94,26,0.06); }
.nav-link.active-section { color: var(--gold); font-weight: 600; }
.nav-link.kn { font-family: 'Noto Sans Kannada', sans-serif; font-size: 0.72rem; }

/* ── Lang toggle ── */
.lang-toggle {
  background: var(--header-bg); border: 1px solid var(--border-light);
  border-radius: 20px; padding: 5px 4px; display: flex; gap: 3px;
  flex-shrink: 0;
}
.lang-btn { font-size: 0.75rem; padding: 4px 10px; border-radius: 16px; border: none; background: none; cursor: pointer; color: var(--meta); font-family: 'EB Garamond', serif; transition: all 0.18s; }
.lang-btn.active { background: var(--gold); color: #fff; font-weight: 600; }
.lang-btn.kn-btn { font-family: 'Noto Sans Kannada', sans-serif; font-size: 0.78rem; }

/* ── Book Hero Layout ── */
.book-hero {
  display: flex; gap: 32px; padding: 30px 20px;
  border-bottom: 1px solid var(--border); margin-bottom: 24px;
}
.cover-gallery { display: flex; gap: 12px; flex-shrink: 0; }

.book-cover {
  width: 140px; height: 200px; background: #eee6dc;
  border: 1px solid var(--border-light); border-radius: 6px;
  overflow: hidden; box-shadow: 3px 6px 12px rgba(0,0,0,0.08);
  display: flex; align-items: center; justify-content: center; position: relative;
  cursor: pointer;
}
.book-cover img { width: 100%; height: 100%; object-fit: contain; }
.cover-label {
  position: absolute; bottom: 0; width: 100%; background: rgba(26,18,8,0.75);
  color: #fff; font-size: 0.65rem; text-align: center; padding: 3px 0;
  font-family: 'Cinzel', serif; letter-spacing: 0.1em;
}
.cover-placeholder-text {
  font-family: 'Noto Serif Kannada', serif; font-size: 0.85rem;
  color: var(--meta); text-align: center; padding: 10px; line-height: 1.3;
}

.book-details { flex-grow: 1; }
.book-title { font-family: 'Noto Serif Kannada', serif; font-size: 1.8rem; color: var(--c2-base); font-weight: 600; }
.book-roman { font-family: 'EB Garamond', serif; font-size: 1.05rem; font-style: italic; color: var(--meta); margin-bottom: 12px; display: block; }
.book-synopsis { font-size: 0.98em; line-height: 1.6; color: var(--text); margin-bottom: 16px; }
.book-synopsis.kn { font-family: 'Noto Sans Kannada', sans-serif; font-size: 0.88rem; }

/* ── Action Buttons ── */
.action-hub { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
.btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px;
  font-size: 0.85em; border: 1px solid var(--border-light); border-radius: 4px;
  cursor: pointer; font-family: 'EB Garamond', serif; text-decoration: none; transition: all 0.15s;
}
.btn.kn-btn { font-family: 'Noto Sans Kannada', sans-serif; font-size: 0.78rem; }
.btn-primary { background: var(--gold); color: #fff; border-color: var(--gold); font-weight: 600; }
.btn-primary:hover { background: var(--gold-light); border-color: var(--gold-light); }
.btn-secondary { background: #fff; color: var(--text); border: 1px solid var(--border-light); }
.btn-secondary:hover { background: var(--header-bg); }

/* ── Section Headings ── */
.section-heading {
  font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 0.3em;
  text-transform: uppercase; color: var(--meta); text-align: center; margin: 36px 0 16px;
}
.section-heading.kn { font-family: 'Noto Sans Kannada', sans-serif; font-size: 0.88rem; letter-spacing: 0.05em; text-transform: none; }

/* ── Sample Verses Section ── */
.sample-section {
  max-width: 580px; margin: 0 auto; padding: 25px;
  background: var(--section-bg); border: 1px solid var(--border); border-radius: 8px;
  min-height: 140px; display: flex; align-items: center; justify-content: center;
}
.verse-block { text-align: center; font-family: 'Noto Serif Kannada', serif; font-size: 1.05rem; line-height: 1.8; width: 100%; }
.verse-num { font-size: 0.85rem; color: var(--gold-dim); display: block; margin-top: 10px; font-family: 'EB Garamond', serif; }

/* ── Reviews Section ── */
.reviews-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 16px; padding: 0 20px;
}
.review-card {
  background: var(--section-bg); border: 1px solid var(--border);
  border-radius: 8px; padding: 18px 20px; position: relative;
}
.review-card::before {
  content: '\201C'; font-family: 'EB Garamond', serif;
  font-size: 3rem; color: var(--border-light);
  position: absolute; top: 6px; left: 14px; line-height: 1;
}
.review-text { font-size: 0.93em; font-style: italic; line-height: 1.65; color: var(--text); padding-top: 18px; }
.review-text.kn { font-family: 'Noto Sans Kannada', sans-serif; font-style: normal; font-size: 0.85em; }
.review-source { margin-top: 10px; font-size: 0.78em; color: var(--meta); font-family: 'Cinzel', serif; letter-spacing: 0.06em; }
.review-source a { color: var(--gold-dim); text-decoration: none; }
.review-source a:hover { text-decoration: underline; color: var(--gold); }

/* ── Media Grid Layout ── */
.media-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 0 20px; }
.media-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
.video-container { position: relative; width: 100%; padding-bottom: 56.25%; background: #000; }
.video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
.media-info { padding: 12px; }
.media-label { font-size: 0.7em; letter-spacing: 0.1em; color: var(--gold-dim); font-family: 'Cinzel', serif; margin-bottom: 4px; display: block; }
.media-label.kn { font-family: 'Noto Sans Kannada', sans-serif; font-size: 0.72rem; letter-spacing: 0; }
.media-title { font-family: 'EB Garamond', serif; font-size: 0.95rem; color: var(--text); min-height: 38px; line-height: 1.4; }
.media-title.kn { font-family: 'Noto Serif Kannada', serif; }

/* ── Footer ── */
.section-divider { height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent); margin: 48px 20px 0; }
footer { text-align: center; color: var(--meta); margin-top: 24px; font-size: 0.82em; }
footer.kn { font-family: 'Noto Sans Kannada', sans-serif; }

/* ── Responsive ── */
@media (max-width: 768px) {
  .media-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .reviews-grid { grid-template-columns: 1fr; }
  .book-hero { flex-direction: column; align-items: center; text-align: center; }
  .action-hub { justify-content: center; }
  .site-nav { flex-wrap: wrap; padding: 8px 12px; min-height: unset; }
  .nav-home { width: 100%; padding-bottom: 6px; line-height: 1.4; }
  .nav-links { width: 100%; overflow-x: auto; }
  .nav-link { font-size: 0.72rem; padding: 0 8px; line-height: 32px; }
  .lang-toggle { margin: 4px 0; }
}
@media (max-width: 520px) {
  .media-grid { grid-template-columns: 1fr; }
}
</style>
</head>

function injectRandomVerse() {
  const container = document.getElementById('dynamicVerse');
  if (!container || VERSES_POOL.length === 0) return;
  const picked = VERSES_POOL[Math.floor(Math.random() * VERSES_POOL.length)];
  container.innerHTML = `${picked.text}<span class="verse-num">— ${picked.num}</span>`;
}

let currentLang = 'en';

function applyLocalization(l) {
  currentLang = l;
  document.getElementById('htmlRoot').lang = l === 'kn' ? 'kn' : 'en';
  document.getElementById('btnEN').classList.toggle('active', l === 'en');
  document.getElementById('btnKN').classList.toggle('active', l === 'kn');
  renderNav(l);

  const s = STR[l];

  document.getElementById('bookSynopsis').textContent = s.synopsis;
  document.getElementById('bookSynopsis').className   = 'book-synopsis' + (l === 'kn' ? ' kn' : '');
  document.getElementById('btnBuy').textContent       = s.buyText;
  document.getElementById('btnBuy').className         = 'btn btn-primary' + (l === 'kn' ? ' kn-btn' : '');
  document.getElementById('btnBuyExotic').textContent = s.buyExoticText;
  document.getElementById('btnBuyExotic').className   = 'btn btn-primary' + (l === 'kn' ? ' kn-btn' : '');
  document.getElementById('btnGoodreads').textContent = s.grText;
  document.getElementById('btnGoodreads').className   = 'btn btn-secondary' + (l === 'kn' ? ' kn-btn' : '');

  document.getElementById('sampleHeading').textContent  = s.sampleHeading;
  document.getElementById('sampleHeading').className    = 'section-heading' + (l === 'kn' ? ' kn' : '');
  document.getElementById('reviewsHeading').textContent = s.reviewsHeading;
  document.getElementById('reviewsHeading').className   = 'section-heading' + (l === 'kn' ? ' kn' : '');
  document.getElementById('mediaHeading').textContent   = s.mediaHeading;
  document.getElementById('mediaHeading').className     = 'section-heading' + (l === 'kn' ? ' kn' : '');

  s.reviews.forEach((r, i) => {
    const n     = i + 1;
    const textEl = document.getElementById('reviewText'   + n);
    const srcEl  = document.getElementById('reviewSource' + n);
    if (textEl) { textEl.textContent = r.text; textEl.className = 'review-text' + (l === 'kn' ? ' kn' : ''); }
    if (srcEl)  { srcEl.innerHTML = r.url ? `<a href="${r.url}" target="_blank">${r.source}</a>` : r.source; }
  });

  for (let i = 1; i <= 11; i++) {
    const lblEl   = document.getElementById('lblMedia'   + i);
    const titleEl = document.getElementById('titleMedia' + i);
    if (lblEl)   { lblEl.textContent   = s['lbl' + i] || ''; lblEl.className   = 'media-label' + (l === 'kn' ? ' kn' : ''); }
    if (titleEl) { titleEl.textContent = s['t'   + i] || ''; titleEl.className = 'media-title' + (l === 'kn' ? ' kn' : ''); }
  }

  document.getElementById('footerEl').textContent = s.footer;
  document.getElementById('footerEl').className   = l === 'kn' ? 'kn' : '';
}

document.getElementById('langToggle').addEventListener('click', e => {
  const btn = e.target.closest('.lang-btn');
  if (!btn) return;
  applyLocalization(btn.id === 'btnKN' ? 'kn' : 'en');
});

// Bootstrap — read ?lang=kn from URL or default to EN
const urlParams = new URLSearchParams(window.location.search);
applyLocalization(urlParams.get('lang') === 'kn' ? 'kn' : 'en');
injectRandomVerse();
</script>
